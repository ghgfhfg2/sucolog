<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | strip_html | default: site.description | strip_newlines }}" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
</head>
<body>
  <header class="wrap">
    <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
    <p>{{ site.description }}</p>
    <nav>
      <a href="{{ '/' | relative_url }}">홈</a>
      <a href="{{ '/about/' | relative_url }}">소개</a>
      <a href="{{ '/disclaimer/' | relative_url }}">면책</a>
      <a href="{{ '/privacy/' | relative_url }}">개인정보</a>
    </nav>
  </header>
  <main class="wrap">
    {{ content }}
  </main>
  <footer class="wrap footer">
    <small>© {{ "now" | date: "%Y" }} {{ site.title }}</small>
  </footer>
</body>
</html>
