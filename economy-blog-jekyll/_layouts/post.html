---
layout: default
---
<article class="post-wrap">
  <h1>{{ page.title }}</h1>
  <p class="meta">{{ page.date | date: "%Y-%m-%d" }}</p>

  {% if page.categories %}
  <p class="tags">
    {% for c in page.categories %}
      <span class="tag">{{ c }}</span>
    {% endfor %}
  </p>
  {% endif %}

  <div class="post-content">
    {{ content }}
  </div>

  <div class="disclaimer-box">
    <strong>면책</strong><br>
    본 글은 정보 제공 목적이며 투자 권유가 아닙니다. 최종 투자 판단은 본인 책임입니다.
  </div>
</article>
