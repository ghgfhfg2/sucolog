name: Daily glossary publish (19:00 KST)

on:
  schedule:
    - cron: "0 10 * * *" # 19:00 Asia/Seoul
  workflow_dispatch:

permissions:
  contents: write

jobs:
  glossary_publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: economy-blog-jekyll
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate glossary post
        run: python scripts/generate_glossary_post.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts/*.md
          git diff --staged --quiet || git commit -m "chore: daily glossary publish"
          git push
