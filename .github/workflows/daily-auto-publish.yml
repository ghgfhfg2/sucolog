name: Daily auto publish (12:00 KST)

on:
  schedule:
    - cron: "0 3 * * *" # 12:00 Asia/Seoul
  workflow_dispatch:

permissions:
  contents: write

jobs:
  autopublish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: economy-blog-jekyll
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Crawl hot topics
        run: python scripts/hot_topics.py

      - name: Generate daily post
        run: python scripts/generate_daily_post.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/hot_topics.json _posts/*.md
          git diff --staged --quiet || git commit -m "chore: daily auto publish"
          git push
