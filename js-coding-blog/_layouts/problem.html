---
layout: default
---

<article class="problem-page"
  data-problem-id="{{ page.slug | default: page.url }}"
  data-function-name="{{ page.function_name }}"
  data-starter-code="{{ page.starter_code | jsonify | escape }}"
  data-test-cases="{{ page.test_cases | jsonify | escape }}">
  <header class="problem-header">
    <h1>{{ page.title }}</h1>
    <div class="meta-row">
      {% if page.difficulty %}<span class="pill">{{ page.difficulty }}</span>{% endif %}
      {% if page.category %}<span class="pill">{{ page.category }}</span>{% endif %}
      {% if page.function_name %}<span class="pill">함수명: {{ page.function_name }}</span>{% endif %}
    </div>
  </header>

  <section class="problem-content">
    {{ content }}
  </section>

  <section class="playground">
    <h2>코드 작성</h2>
    <textarea id="editor" spellcheck="false"></textarea>
    <div class="action-row">
      <button id="run-btn" type="button">예제 테스트 실행</button>
      <button id="reset-btn" type="button">초기 코드로 되돌리기</button>
    </div>
  </section>

  <section class="results">
    <h2>실행 결과</h2>
    <pre id="results-output">아직 실행하지 않았습니다.</pre>
  </section>
</article>

<script src="/assets/js/problem-runner.js"></script>
